name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable # conformance/13 spawns the Rust relay
      - run: npm ci || npm install
      - run: npx tsc -b
      - run: cargo build --manifest-path rust/Cargo.toml -p magpie-relay
      - run: npx vitest run

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path rust/Cargo.toml
