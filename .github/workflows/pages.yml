name: pages
on:
  push:
    branches: [main]
    paths: ["site/**", "scripts/install.*", "deploy/relay/setup.sh", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # short install URLs: serve the installers from Pages
      - run: |
          cp scripts/install.sh scripts/install.ps1 site/
          cp deploy/relay/setup.sh site/deploy-relay.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
      - id: d
        uses: actions/deploy-pages@v4
